<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBook</title>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RecipeBook" />
    <meta property="og:description" content="Find simple, delicious recipes like our Apple Crisp — a fall favorite served warm with vanilla ice cream." />
    <meta property="og:url" content="https://example.com/recipebook/" />
    <meta property="og:image" content="images/social-preview-image.png" />

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RecipeBook" />
    <meta name="twitter:description" content="Find simple, delicious recipes like our Apple Crisp — a fall favorite served warm with vanilla ice cream." />
    <meta name="twitter:image" content="images/social-preview-image.png" />

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="favicon.ico" />

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />

    <!-- Amatic SC for headlines -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="recipes.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="logo">
        <img src="images/recipe-book.png" alt="RecipeBook logo" />
        <h1>RecipeBook</h1>
      </div>

      <form class="search" role="search">
        <input type="search" placeholder="Find a recipe" aria-label="Find a recipe" />
        <button type="submit" aria-label="Search">
          <img src="images/search.svg" alt="" />
        </button>
      </form>
    </header>

    <main>
      <article class="recipe-card">
        <img class="recipe-image" src="images/apple-crisp.jpg" alt="bowl of apple crisp topped with vanilla ice cream" />
        <div class="recipe-content">
          <p class="tag">dessert</p>
          <h2>Apple Crisp</h2>
          <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
          </span>
          <p class="recipe-description">
            This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
          </p>
        </div>
      </article>
    </main>

    <footer>
      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>

      <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon" /></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon" /></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon" /></a>
      </div>
    </footer>
  </body>
</html>
